default: &default
  adapter: postgresql
  encoding: utf8
  pool: 5
  timeout: 5000
<% if ENV['DATABASE_USERNAME'] %>
  username: <%= ENV['DATABASE_USERNAME'] %>
<% end %>
<% if ENV['DATABASE_PASSWORD'] %>
  password: <%= ENV['DATABASE_PASSWORD'] %>
<% end %>
  host: <%= ENV['DATABASE_HOST'] || 'localhost' %>

development:
  <<: *default
  database: sf_dahlia

test:
  <<: *default
  database: sf_dahlia_test
